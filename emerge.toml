# arch-emerge — local paths (edit [paths] for your machine).

manual_update_packages = ["systemd", "qemu-full", "mesa", "lib32-mesa"]
skip_install_packages = [
    "systemd-tests",
    "qemu-user-static-binfmt",
    "qemu-user-static",
    "qemu-guest-agent",
]

[paths]
packages_path = "/media/storage/packages/my"
chroot_base_path = "/media/storage/packages/my/chroot"
ready_made_packages_path = "/media/storage/packages/emerge_ready"

[build]
default_environment = "local"

[system_update]
command = "yay -Su"
command_with_refresh = "yay -Syu"
ignore_flag = "--ignore"
ignore_packages = ["firefox", "firefox-pure"]

[repositories]
arch = "https://gitlab.archlinux.org/archlinux/packaging/packages"
cachyos = "https://github.com/CachyOS/CachyOS-PKGBUILDS.git"
ventureoo = "https://github.com/ventureoo/PKGBUILDs.git"
venomo = "https://github.com/Ven0m0/PKG.git"
default = "arch"

[packages]

[packages.systemd]
source = "arch"
build_env = "local"
tests = false

[packages.qemu-full]
source = "arch"
build_env = "local"
tests = true
alias = "qemu"

[packages.firefox-pure]
source = "ventureoo"
build_env = "local"
tests = true

[packages.vim]
source = "arch"
build_env = "local"
tests = false

[packages.mesa]
source = "cachyos"
build_env = "local"
tests = true

[packages.lib32-mesa]
source = "cachyos"
build_env = "local"
tests = true
