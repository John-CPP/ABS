# ABS — local paths (edit [paths] for your machine).
config_version = 1

manual_update_packages = [
    "systemd",
    "qemu-full",
    "mesa",
    "lib32-mesa",
    "firefox-pure",
]
skip_install_packages = [
    "systemd-tests",
    "qemu-user-static-binfmt",
    "qemu-user-static",
    "qemu-guest-agent",
]

[paths]
packages_path = "/media/storage/packages/abs/packages"
chroot_base_path = "/media/storage/packages/abs/chroot"
ready_made_packages_path = "/media/storage/packages/abs/ready"

[ramdisk]
enabled = false
mount_point = "/run/abs-ram"
size = "16G"
mode = "0755"
build_workdir = false
chroot = false
packages = false
# seed_chroot_from = "/media/storage/packages/abs/chroot"
sync_chroot_on_exit = false
min_free_ram_mb = 4096
warn_packages_ram = true
reclaim_mount_on_startup = true

[build]
default_environment = "local"
ignore_compilation_failures = false
compile_first_install_after = false
clean_install_by_default = false
clean_chroot_after_compilation = true

[system_update]
command_to_update_repositories = "yay -Sy"
command_to_perform_system_update = "yay -Syu"
command_to_perform_system_update_no_refresh = "yay -Su"
ignore_flag = "--ignore"
ignore_packages = []

[repositories]
arch = "https://gitlab.archlinux.org/archlinux/packaging/packages"
cachyos = "https://github.com/CachyOS/CachyOS-PKGBUILDS.git"
ventureoo = "https://github.com/ventureoo/PKGBUILDs.git"
venomo = "https://github.com/Ven0m0/PKG.git"
default = "arch"

[packages]

[packages.systemd]
source = "arch"
build_env = "local"
tests = false

[packages.qemu-full]
source = "arch"
build_env = "local"
tests = true
alias = "qemu"

[packages.firefox-pure]
source = "ventureoo"
build_env = "local"
tests = true

[packages.vim]
source = "arch"
build_env = "local"
tests = false

[packages.mesa]
source = "cachyos"
build_env = "local"
tests = true
custom_local_build_command = "export CC=clang; export CXX=clang++; makepkg --syncdeps --noconfirm --needed -f"

[packages.lib32-mesa]
source = "cachyos"
build_env = "local"
tests = true
custom_local_build_command = "export CC=clang; export CXX=clang++; makepkg --syncdeps --noconfirm --needed -f"
